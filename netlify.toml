# Netlify deployment configuration for SonoTech Ultrasonic
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command
  command = "pnpm install && pnpm run build"
  # Directory to publish (Vite outputs to dist/public for static assets)
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

# Redirect rules
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/products"
  to = "/products/index.html"
  status = 301

[[redirects]]
  from = "/applications"
  to = "/applications/index.html"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/case-studies/index.html"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/resources/index.html"
  status = 301

[[redirects]]
  from = "/downloads"
  to = "/downloads/index.html"
  status = 301

[[redirects]]
  from = "/industries"
  to = "/industries/index.html"
  status = 301

# Netlify Identity for CMS
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
